<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技開發者問卷調查</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob shape1"></div>
        <div class="blob shape2"></div>
        <div class="blob shape3"></div>
    </div>
    
    <div class="container">
        <header class="form-header">
            <h1>「Reborn 重塑新生」環保袋 問卷調查</h1>
            <p>感謝您撥冗填寫本問卷。我們正在開發一款結合永續材質與科技互動的新一代環保袋，希望能了解您的想法與使用習慣。</p>
        </header>

        <form id="survey-form">
            <h3 class="section-title">第一部分：日常習慣與痛點</h3>
            <!-- Q1 -->
            <div class="form-group">
                <label class="question-label">1. 請問您平常購物時，購買或索取「一次性塑膠袋」的頻率為何？ (單選題)</label>
                <div class="options-container radio-group">
                    <label class="custom-option"><input type="radio" name="q1" value="1" required><span class="custom-radio"></span><span class="option-text">幾乎每天</span></label>
                    <label class="custom-option"><input type="radio" name="q1" value="2"><span class="custom-radio"></span><span class="option-text">一週 3~4 次</span></label>
                    <label class="custom-option"><input type="radio" name="q1" value="3"><span class="custom-radio"></span><span class="option-text">一週 1~2 次</span></label>
                    <label class="custom-option"><input type="radio" name="q1" value="4"><span class="custom-radio"></span><span class="option-text">很少使用（通常會自備環保袋）</span></label>
                    <label class="custom-option"><input type="radio" name="q1" value="5"><span class="custom-radio"></span><span class="option-text">完全不使用</span></label>
                </div>
            </div>

            <!-- Q2 -->
            <div class="form-group">
                <label class="question-label">2. 您認為自己在實踐環保（如自備環保袋）時，最常遇到的困難是什麼？ (多選題)</label>
                <div class="options-container checkbox-group">
                    <label class="custom-option"><input type="checkbox" name="q2[]" value="1"><span class="custom-checkbox"></span><span class="option-text">常常忘記帶出門</span></label>
                    <label class="custom-option"><input type="checkbox" name="q2[]" value="2"><span class="custom-checkbox"></span><span class="option-text">傳統環保袋收納不方便或外觀不好看</span></label>
                    <label class="custom-option"><input type="checkbox" name="q2[]" value="3"><span class="custom-checkbox"></span><span class="option-text">覺得帶不帶沒差，缺乏立即的成就感</span></label>
                    <label class="custom-option"><input type="checkbox" name="q2[]" value="4"><span class="custom-checkbox"></span><span class="option-text">容易弄髒且不易清洗</span></label>
                    <label class="custom-option" style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" name="q2[]" value="other" id="q2-other-checkbox">
                        <span class="custom-checkbox"></span>
                        <span class="option-text" style="white-space: nowrap;">其他：</span>
                        <input type="text" name="q2_other_text" class="inline-text-input" placeholder="請說明..." id="q2-other-text" style="flex: 1; border: 1px solid #d1d5db; border-radius: 8px; padding: 6px 12px; font-family: inherit; font-size: 0.95rem; outline: none; transition: border-color 0.2s;">
                    </label>
                </div>
            </div>

            <h3 class="section-title">第二部分：產品特色與設計接受度</h3>
            <!-- Q3 -->
            <div class="form-group">
                <label class="question-label">3. 【環保材質】「Reborn」環保袋是使用廢棄咖啡渣與生物塑膠製成，使用壽命結束後可埋入土中自然分解並具備增肥效果。這樣的材質會提升您使用它的意願嗎？ (單選題)</label>
                <div class="options-container radio-group inline-radio-group">
                    <label class="custom-option"><input type="radio" name="q3" value="1" required><span class="custom-radio"></span><span class="option-text">1分 (完全不會)</span></label>
                    <label class="custom-option"><input type="radio" name="q3" value="2"><span class="custom-radio"></span><span class="option-text">2分 (不太會)</span></label>
                    <label class="custom-option"><input type="radio" name="q3" value="3"><span class="custom-radio"></span><span class="option-text">3分 (普通)</span></label>
                    <label class="custom-option"><input type="radio" name="q3" value="4"><span class="custom-radio"></span><span class="option-text">4分 (會)</span></label>
                    <label class="custom-option"><input type="radio" name="q3" value="5"><span class="custom-radio"></span><span class="option-text">5分 (非常會)</span></label>
                </div>
            </div>

            <!-- Q4 -->
            <div class="form-group">
                <label class="question-label">4. 【外觀與結構設計】本產品採用「一體成形」與「卡扣式設計」來取代傳統縫線與五金配件，且袋內附有「分隔結構」方便收納。您對此設計實用性的評價為何？ (單選題)</label>
                <div class="options-container radio-group inline-radio-group">
                    <label class="custom-option"><input type="radio" name="q4" value="1" required><span class="custom-radio"></span><span class="option-text">1分 (非常不實用)</span></label>
                    <label class="custom-option"><input type="radio" name="q4" value="2"><span class="custom-radio"></span><span class="option-text">2分 (不太實用)</span></label>
                    <label class="custom-option"><input type="radio" name="q4" value="3"><span class="custom-radio"></span><span class="option-text">3分 (普通)</span></label>
                    <label class="custom-option"><input type="radio" name="q4" value="4"><span class="custom-radio"></span><span class="option-text">4分 (算實用)</span></label>
                    <label class="custom-option"><input type="radio" name="q4" value="5"><span class="custom-radio"></span><span class="option-text">5分 (非常實用)</span></label>
                </div>
            </div>

            <!-- Q5 -->
            <div class="form-group">
                <label class="question-label">5. 【科技整合】環保袋內建 NFC 感測功能，只要用手機輕觸感應，就能自動紀錄您每次使用環保袋的「次數」與「時間」。您認為這個功能對您來說吸引力有多高？ (單選題)</label>
                <div class="options-container radio-group inline-radio-group">
                    <label class="custom-option"><input type="radio" name="q5" value="1" required><span class="custom-radio"></span><span class="option-text">1分 (非常不吸引)</span></label>
                    <label class="custom-option"><input type="radio" name="q5" value="2"><span class="custom-radio"></span><span class="option-text">2分 (不太吸引)</span></label>
                    <label class="custom-option"><input type="radio" name="q5" value="3"><span class="custom-radio"></span><span class="option-text">3分 (普通)</span></label>
                    <label class="custom-option"><input type="radio" name="q5" value="4"><span class="custom-radio"></span><span class="option-text">4分 (吸引)</span></label>
                    <label class="custom-option"><input type="radio" name="q5" value="5"><span class="custom-radio"></span><span class="option-text">5分 (非常吸引)</span></label>
                </div>
            </div>

            <h3 class="section-title">第三部分：遊戲化體驗與行為改變</h3>
            <!-- Q6 -->
            <div class="form-group">
                <label class="question-label">6. 【AI 遊戲化互動】為了消除「知道要環保卻做不到」的行動落差，我們導入了專屬 APP。當您累積使用次數後，可以在 APP 內進行 AI 生成的環保知識問答，並賺取經驗值來解鎖「虛擬寵物（如：R咖啡杯、吉祥物寶寶）」。這項機制會讓您更有動力持續帶環保袋出門嗎？ (單選題)</label>
                <div class="options-container radio-group inline-radio-group">
                    <label class="custom-option"><input type="radio" name="q6" value="1" required><span class="custom-radio"></span><span class="option-text">1分 (完全不會增加動力)</span></label>
                    <label class="custom-option"><input type="radio" name="q6" value="2"><span class="custom-radio"></span><span class="option-text">2分 (不太會)</span></label>
                    <label class="custom-option"><input type="radio" name="q6" value="3"><span class="custom-radio"></span><span class="option-text">3分 (普通)</span></label>
                    <label class="custom-option"><input type="radio" name="q6" value="4"><span class="custom-radio"></span><span class="option-text">4分 (會增加動力)</span></label>
                    <label class="custom-option"><input type="radio" name="q6" value="5"><span class="custom-radio"></span><span class="option-text">5分 (非常有動力)</span></label>
                </div>
            </div>

            <!-- Q7 -->
            <div class="form-group">
                <label class="question-label">7. 【教育意義】您認為將「環保知識問答」與「養成遊戲」結合，是否能有效幫助您或周遭的人學習到正確的永續發展觀念？ (單選題)</label>
                <div class="options-container radio-group inline-radio-group">
                    <label class="custom-option"><input type="radio" name="q7" value="1" required><span class="custom-radio"></span><span class="option-text">1分 (非常沒幫助)</span></label>
                    <label class="custom-option"><input type="radio" name="q7" value="2"><span class="custom-radio"></span><span class="option-text">2分 (沒什麼幫助)</span></label>
                    <label class="custom-option"><input type="radio" name="q7" value="3"><span class="custom-radio"></span><span class="option-text">3分 (普通)</span></label>
                    <label class="custom-option"><input type="radio" name="q7" value="4"><span class="custom-radio"></span><span class="option-text">4分 (有幫助)</span></label>
                    <label class="custom-option"><input type="radio" name="q7" value="5"><span class="custom-radio"></span><span class="option-text">5分 (非常有幫助)</span></label>
                </div>
            </div>

            <!-- Q8 -->
            <div class="form-group">
                <label class="question-label">8. 【成效評估】綜合比較傳統環保袋，您認為「Reborn」將環保成效數據化（讓您清楚看到自己減少了多少塑膠），是否能有效改善您的環保習慣？ (單選題)</label>
                <div class="options-container radio-group">
                    <label class="custom-option"><input type="radio" name="q8" value="1" required><span class="custom-radio"></span><span class="option-text">是，看到明確數據會有成就感，進而養成習慣。</span></label>
                    <label class="custom-option"><input type="radio" name="q8" value="2"><span class="custom-radio"></span><span class="option-text">否，對我來說數據跟遊戲化的影響不大。</span></label>
                    <label class="custom-option"><input type="radio" name="q8" value="3"><span class="custom-radio"></span><span class="option-text">不確定，需要實際體驗才知道。</span></label>
                </div>
            </div>

            <h3 class="section-title">第四部分：購買意願與回饋</h3>
            <!-- Q9 -->
            <div class="form-group">
                <label class="question-label">9. 【購買意願】綜合以上特色（可分解咖啡渣材質、NFC感測紀錄、AI問答與虛擬寵物養成），未來若此產品上市，您的購買意願有多高？ (單選題)</label>
                <div class="options-container radio-group inline-radio-group">
                    <label class="custom-option"><input type="radio" name="q9" value="1" required><span class="custom-radio"></span><span class="option-text">1分 (完全不想買)</span></label>
                    <label class="custom-option"><input type="radio" name="q9" value="2"><span class="custom-radio"></span><span class="option-text">2分 (不太想買)</span></label>
                    <label class="custom-option"><input type="radio" name="q9" value="3"><span class="custom-radio"></span><span class="option-text">3分 (考慮看看)</span></label>
                    <label class="custom-option"><input type="radio" name="q9" value="4"><span class="custom-radio"></span><span class="option-text">4分 (想買)</span></label>
                    <label class="custom-option"><input type="radio" name="q9" value="5"><span class="custom-radio"></span><span class="option-text">5分 (非常想買)</span></label>
                </div>
            </div>

            <!-- Q10 -->
            <div class="form-group">
                <label class="question-label" for="q10">10. 【開放建議】對於「Reborn 重塑新生」環保袋，您有任何其他的建議，或是期待產品未來還能增加什麼樣的功能嗎？ (簡答題)</label>
                <textarea id="q10" name="q10" rows="4" placeholder="請寫下您的想法與建議..."></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="submit-btn">提交問卷 <span class="arrow">→</span></button>
            </div>
        </form>

        <div id="success-message" class="hidden">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h2>感謝您的回饋！</h2>
            <p>我們已經收到您的問卷資料，這對我們非常有幫助。</p>
            <button id="reset-btn" class="secondary-btn">填寫另一份問卷</button>
        </div>
    </div>
    
    <script type="module" src="script.js"></script>
</body>
</html>
